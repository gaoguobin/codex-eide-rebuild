name: Bug report
description: Report a reproducible problem in the runner or skill
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Provide exact reproduction steps with sanitized sample paths only.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the JSON output and a sanitized compiler log excerpt when relevant.
